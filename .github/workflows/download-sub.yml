name: Download YT Subtitles

on:
  workflow_dispatch:

  schedule:
    - cron: "0 23 * * *"

concurrency:
  group: download-sub-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  ARCHIVE_FILE: data/archive.json
  SUBTITLE_DIR: data/subtitles

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download subtitles
        run: |
          python scripts/download_sub.py \
            --archive "${{ env.ARCHIVE_FILE }}" \
            --output-dir "${{ env.SUBTITLE_DIR }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/subtitles
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Unstaged generated files under data/ detected"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet && exit 0

          fi
          git commit -m "chore: update subtitles"

          git push
