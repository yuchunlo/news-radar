name: Download YT Subtitles

on:
  workflow_dispatch:

  schedule:
    - cron: "0 21 * * *"

concurrency:
  group: download-sub-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  ARCHIVE_FILE: data/archive.json
  SUBTITLE_DIR: data/subtitles
  COOKIES_PATH: /dev/shm/cookies.txt
  MAX_ITEMS_PER_RUN: 400

jobs:
  download:
    runs-on: ubuntu-latest

    services:
      bgutil-pot:
        image: brainicism/bgutil-ytdlp-pot-provider
        ports:
          - 4416:4416

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" | base64 -d > "$COOKIES_PATH"
          chmod 600 "$COOKIES_PATH"

          if [ ! -s "$COOKIES_PATH" ]; then
            echo "::error::cookies file is empty after decode"
            exit 1
          fi

          awk -F'\t' 'NF>=7 {print $NF}' "$COOKIES_PATH" | while IFS= read -r val; do
            if [ -n "$val" ]; then
              echo "::add-mask::$val"
            fi
          done

          echo "cookies file loaded, $(wc -l < "$COOKIES_PATH") lines"

      - name: Download subtitles
        run: |
          python scripts/download_sub.py \
            --archive "${{ env.ARCHIVE_FILE }}" \
            --output-dir "${{ env.SUBTITLE_DIR }}" \
            --cookies-path "${{ env.COOKIES_PATH }}" \
            --max-items "${{ env.MAX_ITEMS_PER_RUN }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/subtitles
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Unstaged generated files under data/ detected"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update subtitles"

          git push

      - name: Cleanup
        if: always()
        run: rm -f "$COOKIES_PATH"
